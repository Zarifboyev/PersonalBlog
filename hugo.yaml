# ---------------------------
# General Site Configuration
# ---------------------------
baseURL: "https://shaxsiyblogim.netlify.app/"
theme: "PaperMod"
languageCode: "uz-UZ"
defaultContentLanguage: uz
defaultContentLanguageInSubdir: true
disableDefaultLanguageRedirect: false
disableLanguages: []

title: "Zarifboyev's Space"

# ---------------------------
# Build & Output Settings
# ---------------------------
enableInlineShortcodes: true
enableRobotsTXT: true
enableEmoji: true
buildDrafts: false
buildFuture: false
buildExpired: false
pygmentsUseClasses: true
canonifyURLs: true

ignoreFiles:
  - "\\.git/"
  - "\\.git/hooks/"
  - "\\.git/hooks/.*"
  - "public/"

minify:
  disableXML: false # Keep XML enabled so Google can index properly
  minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

sitemap:
  changefreq: "monthly"
  priority: 0.5
  filename: "sitemap.xml"

# ---------------------------
# Multilingual Configuration
# ---------------------------
languages:
  uz:
    title: Zarifboyev's Space
    languageName: "O'zbek tilida 🇺🇿"
    languageCode: uz-UZ
    languageDirection: "ltr"
    weight: 1
    disabled: false
    contentDir: content/uz/

    taxonomies:
      category: kategoriya
      tag: teglar
      series: series

    menu:
      main:
        - name: Arxiv
          url: archives/
          weight: 5
        - name: Kategoriyalar
          url: kategoriya/
          weight: 10
        - name: Teglar
          url: teglar/
          weight: 10
        - name: Qidiruv
          url: search/
          weight: 15

    params:
      editPost:
        URL: "mailto:zarifboyev@duck.com?subject=Bizga xabar bering"
        Text: "Xatolik topdingizmi? Bizga xabar bering" # edit text
        appendFilePath: true # to append file path to Edit link
      profileMode:
        enabled: true
        title: "Zarifboyev's Blog"

        imageUrl: "/images/uploads/smile.png"
        # imageTitle: "Men ishxonamda"
        subtitle: "Kulib turing, sizga yarashadi..."
        buttons:
          - name: Blog
            url: posts
          - name: Teglar
            url: teglar/
          # - name: LinkedIn
          #   url: https://www.linkedin.com/

      socialIcons: # optional
        - name: "twitter"
          url: "https://x.com/"
        - name: "stackoverflow"
          url: "https://stackoverflow.com/"
        - name: "linkedin"
          url: "https://linkedin.com/"
        - name: "github"
          url: "https://github.com/"
  ru:
    title: Zarifboyev's Space
    languageName: "По-русски 🇷🇺"
    weight: 2
    contentDir: content/ru/

    taxonomies:
      category: категории
      tag: теги
      series: серии

    menu:
      main:
        - name: Архив
          url: archives/
          weight: 5
        - name: Теги
          url: теги/
          weight: 10
        - name: Категории
          url: категории/
          weight: 15
        - name: Поиск
          url: search/
          weight: 20

    params:
      editPost:
        URL: "mailto:zarifboyev@duck.com?subject=Сообщите нам"
        Text: "Нашли ошибку? Сообщите нам." # edit text
        appendFilePath: true # to append file path to Edit link
      profileMode:
        enabled: true
        title: "Блог Зарифбоева"

        imageUrl: "/images/uploads/smile.png"
        # imageTitle: "Я на работе"
        subtitle: "Улыбайтесь, вам идет!"

        #imageWidth: 120 # You can set custom image size depending on your needs
        #imageHeight: 120 # You can set custom image size depending on your needs
        buttons:
          - name: Блог
            url: posts
          - name: Теги
            url: теги/
        # Depending on, you can add additional social media pages:

      socialIcons: # optional
        - name: "twitter"
          url: "https://x.com/"
        - name: "stackoverflow"
          url: "https://stackoverflow.com/"
        - name: "linkedin"
          url: "https://linkedin.com/"
        - name: "github"
          url: "https://github.com/"
# ---------------------------
# Theme Parameters
# ---------------------------
params:
  env: production # Enables Google Analytics, OpenGraph, Twitter Cards, Schema
  copyright: © 2023 ABC Widgets, Inc.
  defaultTheme: auto
  displayFullLangName: true

  ShowToc: true
  ShowPageNums: true
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true
  ShowAllPagesInArchive: true
  ShowPostNavLinks: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  ShowWordCount: true

  analytics:
    google:
      SiteVerificationTag: "G-GYEHTYP7RG"

  assets:
    disableHLJS: true
    disableFingerprinting: true
    favicon: "/assets/favicon.ico"
    favicon16x16: "/assets/favicon-16x16.png"
    favicon32x32: "/assets/favicon-32x32.png"
    apple_touch_icon: "/assets/apple-touch-icon.png"
    # safari_pinned_tab: "<link / abs url>"
  cover:
    # hidden: true # hide everywhere but not in structured data
    # hiddenInList: true # hide on list pages and home
    # hiddenInSingle: true # hide on single page
    # linkFullImages: true
    # responsiveImages: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

# ---------------------------
# Markup & Highlighting
# ---------------------------
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    anchorLineNos: true
    style: monokai

# ---------------------------
# Privacy Settings
# ---------------------------
privacy:
  vimeo:
    disabled: false
    simple: true
  x:
    disabled: false
    enableDNT: true
    simple: true
  instagram:
    disabled: false
    simple: true
  youtube:
    disabled: false
    privacyEnhanced: true

# ---------------------------
# Services
# ---------------------------
services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
