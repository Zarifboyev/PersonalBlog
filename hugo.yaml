# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "localhost:1313"

# copyright: "© [PaperMod Contributors](https://github.com/adityatelange/hugo-PaperMod/graphs/contributors)"
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
# mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  # minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 5

defaultContentLanguage: uz
defaultContentLanguageInSubdir: false
disableDefaultLanguageRedirect: false
disableLanguages: []

languages:
  uz:
    title: Shunchaki blog
    languageName: "O'zbek tilida 🇺🇿"
    weight: 1
    disabled: false
    languageCode: uz
    languageDirection: "ltr"
    taxonomies:
      category: kategoriya
      tag: tags
      series: series
    menu:
      main:
        - name: Arxiv
          url: archives/
          pageRef: /archives
          weight: 5
        - name: Kategoriyalar
          url: kategoriya/
          pageRef: /kategoriya
          weight: 10
        - name: Teglar
          url: tags/
          pageRef: /tags
          weight: 10
        - name: Qidiruv 🔍
          url: search/
          pageRef: /search
          weight: 15
    params:
      profileMode:
        enabled: true
        title: Samandar Akbarov
        imageUrl: "https://images.squarespace-cdn.com/content/v1/604cfdc39aaba3370efa9ec0/1616004266730-MNW7C5O07P3TE7T8647F/TYLER-GARRETSON_58-SQUARE.jpg"
        imageTitle: Men ishxonamda
        # imageWidth: 120
        # imageHeight: 120
        subtitle: "🚀 Sun’iy intellekt va raqamli yetakchilik | Biznes va raqamli o‘zgarishlar | Innovatsiya | Strategiya | Avanade (Accenture va Microsoft qo‘shma korxonasi)da boshqaruv direktori | SMUda sun’iy intellekt professori | Maslahat kengashi a’zosi"
        buttons:
          - name: Blog
            url: posts
          - name: LinkedIn
            url: https://www.linkedin.com/in/joellindsey/

  ru:
    languageName: "По-русски :ru:"
    weight: 2
    title: Просто блог
    taxonomies:
      category: категории
      tag: теги
      series: серии
    menu:
      main:
        - name: Архив
          url: archives/
          pageRef: /archives
          weight: 5
        - name: Теги
          url: теги/
          pageRef: /теги
          weight: 10
        - name: Категории
          url: категории/
          pageRef: /категории
          weight: 10
        # - name: RuSeriyalar
        #   url: ruseries
        #   weight: 10
        - name: Поиск 🔍
          url: search/
          pageRef: /search
          weight: 15

        # - name: NullLink
        #   url: "#"

    # custom params for each language should be under [langcode].parms - hugo v0.120.0
    params:
      # languageAltTitle: "RU +"
      profileMode:
        enabled: true
        title: Самандар Акбаров
        imageUrl: "https://images.squarespace-cdn.com/content/v1/604cfdc39aaba3370efa9ec0/1616004266730-MNW7C5O07P3TE7T8647F/TYLER-GARRETSON_58-SQUARE.jpg"
        imageTitle: Я на работе
        # imageWidth: 120
        # imageHeight: 120
        subtitle: "🔹 Искусственный интеллект и цифровое лидерство | Бизнес и цифровые преобразования | Инновации | Стратегия | Управляющий директор Avanade (совместное предприятие Accenture и Microsoft) | Профессор искусственного интеллекта в SMU | Член Консультативного совета"
        buttons:
          - name: Блог
            url: posts
          - name: LinkedIn
            url: https://www.linkedin.com/in/joellindsey/

