# This is the configuration file for Decap CMS.
# It should be placed in your site's `static/admin/` folder.
# Set localization for CMS dashboard only:
locale: "ru"
# Set localization i18n

backend:
  name: git-gateway
  branch: main
  squash_merges: true

# The `media_folder` is the path where uploaded media will be saved, relative to the repository root.
# The `public_folder` is the path that will be used in the final front matter for the image URL.
media_folder: "static/images/uploads"
public_folder: "/images"

# Enables editorial workflow, which allows for drafts and reviews before publishing.
publish_mode: editorial_workflow

# Easy to access url to return main site
display_url: https://zarifboyev.space
# Custom logo for dashboard
logo_url: https://zarifboyev.space/images/logo.svg
# Keep search disabled in dashboard to optimize workflow
search: false

# Configures an external media library.
media_library:
  name: uploadcare
  config:
    publicKey: 28d536105b790be0d234
    max_file_size: 10000000 # 10 megabytes

# Defines a custom slug format.
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "_"

  # These are the fields that will appear in the editor for each post.
  # This section defines the content collections for your site.

i18n:
  # Required and can be one of multiple_folders, multiple_files or single_file
  # multiple_folders - persists files in `<folder>/<locale>/<slug>.<extension>`
  structure:
    multiple_folders
    # Required - a list of locales to show in the editor UI
  locales:
    ["ru", "uz"]
    # Optional, defaults to the first item in locales.
    # The locale to be used for fields validation and as a baseline for the entry.
  default_locale: "ru"
collections:
  - label: "O'zbek tilida"
    name: "uzbek_posts"
    folder: "content/uz/posts"
    slug: "{{year}}/{{month}}/{{slug}}"
    # slug: "{{fields.category}}/{{slug}}"
    create: true
    summary: "{{title | upper}} - {{date | date('YYYY-MM-DD')}} – {{body | truncate(20, '***')}}"
    filter: { field: "language", value: "uz" }
    fields:
      - {
          label: "Til",
          name: "language",
          widget: "select",
          options: ["ru", "uz"],
          default: "uz",
        }
      - { label: "Sarlavha", name: "title", widget: "string" }
      - {
          label: "Tavsif",
          name: "description",
          widget: "string",
          required: false,
        }
      - { label: "Sana", name: "date", widget: "datetime" }
      - { label: "Qoralama", name: "draft", widget: "boolean", default: true }
      - { label: "Teglar", name: "tags", widget: "list", required: false }
      - {
          label: "Kategoriyalar",
          name: "kategoriya",
          widget: "list",
          required: false,
        }

      - { label: "Muallif", name: "author", widget: "string", required: false }
      - {
          label: "Asosiy rasm",
          name: "cover",
          widget: "image",
          required: false,
        }
      - {
          label: "Tarkib jadvalini ko‘rsatish",
          name: "ShowToc",
          widget: "boolean",
          default: false,
          required: false,
        }
      - {
          label: "Jadvalni ochiq saqlash",
          name: "TocOpen",
          widget: "boolean",
          default: false,
          required: false,
        }
      - { label: "Maqola matni", name: "body", widget: "markdown" }
  - label: "Блог на русском языке"
    name: "russian_posts"
    folder: "content/ru/posts"
    create: true
    summary: "{{title | upper}} - {{date | date('YYYY-MM-DD')}} – {{body | truncate(20, '***')}}"
    filter: { field: "language", value: "ru" }
    fields:
      - {
          label: "Язык",
          name: "language",
          widget: "select",
          options: ["ru", "uz"],
          default: "ru",
        }
      - { label: "Заголовок", name: "title", widget: "string" }
      - {
          label: "Описание",
          name: "description",
          widget: "string",
          required: false,
        }
      - { label: "Дата", name: "date", widget: "datetime" }
      - { label: "Черновик", name: "draft", widget: "boolean", default: true }
      - { label: "Теги", name: "tags", widget: "list", required: false }
      - {
          label: "Категории",
          name: "категории",
          widget: "list",
          required: false,
        }
      - { label: "Теги", name: "теги", widget: "list", required: false }

      - { label: "Автор", name: "author", widget: "string", required: false }
      - { label: "Обложка", name: "cover", widget: "image", required: false }
      - {
          label: "Показать оглавление",
          name: "ShowToc",
          widget: "boolean",
          default: false,
          required: false,
        }
      - {
          label: "Оглавление открыто",
          name: "TocOpen",
          widget: "boolean",
          default: false,
          required: false,
        }
      - { label: "Содержимое", name: "body", widget: "markdown" }
