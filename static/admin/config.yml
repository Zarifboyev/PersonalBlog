# This is the configuration file for Decap CMS.
# It should be placed in your site's `static/admin/` folder.
# Set localization for CMS dashboard only:
locale: "ru"

backend:
  name: git-gateway
  branch: main
  squash_merges: true

# Enables editorial workflow, which allows for drafts and reviews before publishing.
publish_mode: simple

# Easy to access url to return main site
display_url: https://shaxsiyblogim.netlify.app/
# Custom logo for dashboard
logo_url: https://shaxsiyblogim.netlify.app/images/uploads/logo.svg
# Keep search disabled in dashboard to optimize workflow
search: false

# Configures an external media library.
media_library:
  name: uploadcare
  config:
    publicKey: 28d536105b790be0d234
    max_file_size: 10000000 # 10 megabytes
# The `media_folder` is the path where uploaded media will be saved, relative to the repository root.
# The `public_folder` is the path that will be used in the final front matter for the image URL.
media_folder: "static/images/uploads"
public_folder: "/images"
i18n:
  # Required and can be one of multiple_folders, multiple_files or single_file
  # multiple_folders - persists files in `<folder>/<locale>/<slug>.<extension>`
  structure:
    multiple_folders
    # Required - a list of locales to show in the editor UI
  locales:
    ["ru", "uz"]
    # Optional, defaults to the first item in locales.
    # The locale to be used for fields validation and as a baseline for the entry.
  default_locale: "ru"
# Defines a custom slug format.
slug:
  transliterate: true # Add this line to convert 'Р' to 'R', 'у' to 'u', etc.
  clean_accents: true # Keep for consistency with other languages
  sanitize_replacement: "-" # Use a hyphen for better URL readability

  # These are the fields that will appear in the editor for each post.
  # This section defines the content collections for your site.

collections:
  - label: "O'zbek tilida"
    name: "uzbek_posts"
    folder: "content/uz/posts"
    format: frontmatter
    slug: "{{year}}-{{month}}-{{slug}}"
    # slug: "{{fields.category}}/{{slug}}"
    create: true
    summary: "{{title | upper}} - {{date | date('YYYY-MM-DD')}} – {{body | truncate(20, '***')}}"
    sortable_fields: ["title", "date"]
    fields:
      - { label: "Sarlavha", name: "title", widget: "string" }
      - { label: "Sana", name: "date", widget: "datetime" }

      - {
          label: "Tavsif",
          name: "description",
          widget: "string",
          required: false,
        }
      - { label: "Muallif", name: "author", widget: "list", required: false }
      - { label: "Teglar", name: "teglar", widget: "list", required: false }
      - {
          label: "Kategoriyalar",
          name: "kategoriya",
          widget: "list",
          required: false,
        }
      - {
          label: "Og‘irlik (sahifa tartibi)",
          name: "weight",
          widget: "number",
          hint: "Ushbu sahifaning ro‘yxatdagi ko‘rsatilish tartibini boshqarish uchun raqam kiriting. Kichikroq sonlar (masalan, 10) ro‘yxatning boshida joylashadi. Katta sonlar (masalan, 100) esa ro‘yxatning oxirida ko‘rinadi.",
          required: false,
        }

      # Cover Image Fields
      - label: "Muqova"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - { label: "Tasvir", name: "image", widget: "image", required: false }
          - {
              label: "Rasm ostidagi yozuv",
              name: "caption",
              widget: "string",
              required: false,
            }
          - {
              label: "Alt Text",
              name: "alt",
              widget: "string",
              required: false,
            }
          - {
              label: "Nisbiy yo‘l (majburiy emas)",
              name: "relative",
              widget: "boolean",
              default: false,
              required: false,
              hint: "Agar tasvirga bo‘lgan yo‘l joriy sahifaga nisbatan bo‘lishi kerak bo‘lsa, buni yoqib qo‘ying.",
            }
          - {
              label: "Moslashuvchan tasvirlar (ixtiyoriy)",
              name: "responsiveImages",
              widget: "boolean",
              default: true,
              required: false,
              hint: "Veb-saytingiz turli xil ekranlar uchun rasm versiyalarini avtomatik ravishda yaratishi uchun bu funksiyani yoqing.",
            }
          - {
              label: "Sahifada yashirish (majburiy emas)",
              name: "hidden",
              widget: "boolean",
              default: false,
              required: false,
              hint: "Sahifadagi muqova tasvirini yashirish uchun yoqing.",
            }

      # SEO & Metadata
      - {
          label: "Robots NoIndex (ixtiyoriy)",
          name: "robotsNoIndex",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Bu sahifaning qidiruv tizimlari tomonidan indekslanishini oldini oladi.",
        }
      - {
          label: "Meta-axborotni berkitish (ixtiyoriy)",
          name: "hidemeta",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Sana, o‘qilgan vaqt va muallifni yashiradi.",
        }
      - {
          label: "Tavsifni yig‘ishtirish (majburiy emas)",
          name: "hideSummary",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Ro‘yxatli sahifalarda qisqacha tavsifni yashiradi.",
        }
      - {
          label: "Pastki kolontitulni yashirish (majburiy emas)",
          name: "hideFooter",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Sahifa pastki qismidagi matnni yashiradi.",
        }
      - {
          label: "Yashirin qidiruv (majburiy emas)",
          name: "searchHidden",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Sahifani saytdagi qidiruv natijalaridan yashiradi.",
        }

      # UI & Content Display
      - {
          label: "Mundarijani ko‘rsatish (majburiy emas)",
          name: "toc",
          widget: "boolean",
          default: true,
          required: false,
        }

      - {
          label: "O‘qish vaqtini ko‘rsatish (majburiy emas)",
          name: "ShowReadingTime",
          widget: "boolean",
          default: true,
          required: false,
        }
      - {
          label: "So‘zlar sonini ko‘rsatish (majburiy emas)",
          name: "ShowWordCount",
          widget: "boolean",
          default: true,
          required: false,
        }
      - {
          label: "Navigatsiya yo‘lini ko‘rsatish (ixtiyoriy)",
          name: "ShowBreadCrumbs",
          widget: "boolean",
          default: true,
          required: false,
        }

      # - {
      #     label: "Comments",
      #     name: "comments",
      #     widget: "boolean",
      #     default: false,
      #     required: false,
      #     hint: "Shows/hides comments.",
      #   }

      - { label: "Kontent", name: "body", widget: "markdown", required: true }

  - label: "Блог на русском языке"
    name: "russian_posts"
    folder: "content/ru/posts"
    create: true
    summary: "{{title | upper}} - {{date | date('YYYY-MM-DD')}} – {{body | truncate(20, '***')}}"
    # slug: "{{fields.category}}/{{slug}}"
    slug: "{{year}}-{{month}}-{{slug}}"
    sortable_fields: ["title", "date"]
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime" }

      - {
          label: "Описание",
          name: "description",
          widget: "string",
          required: false,
        }
      - { label: "Автор", name: "author", widget: "list", required: false }
      - { label: "Теги", name: "теги", widget: "list", required: false }
      - {
          label: "Категории",
          name: "категории",
          widget: "list",
          required: false,
        }
      - {
          label: "Вес (заказ страницы)",
          name: "weight",
          widget: "number",
          hint: "Введите число для управления порядком отображения этой страницы в списке. Меньшие числа (например, 10) отображаются в начале списка. Большие числа (например, 100) отображаются в конце",
          required: false,
        }

      # Cover Image Fields
      - label: "Обложка"
        name: "cover"
        widget: "object"
        required: false
        fields:
          - {
              label: "Изображение",
              name: "image",
              widget: "image",
              required: false,
            }
          - {
              label: "Подпись к изображению",
              name: "caption",
              widget: "string",
              required: false,
            }
          - {
              label: "Alt Text",
              name: "alt",
              widget: "string",
              required: false,
            }
          - {
              label: "Относительный путь (Необязательно)",
              name: "relative",
              widget: "boolean",
              default: false,
              required: false,
              hint: "Включите, если путь к изображению должен быть относительным к текущей странице.",
            }
          - {
              label: "Адаптивные изображения (Необязательно)",
              name: "responsiveImages",
              widget: "boolean",
              default: true,
              required: false,
              hint: "Включите, чтобы ваш сайт автоматически генерировал версии изображения для разных экранов.",
            }
          - {
              label: "Скрыть на странице (Необязательно)",
              name: "hidden",
              widget: "boolean",
              default: false,
              required: false,
              hint: "Включите, чтобы скрыть изображение обложки на странице.",
            }

      # SEO & Metadata
      - {
          label: "Robots NoIndex (Необязательно)",
          name: "robotsNoIndex",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Предотвращает индексирование этой страницы поисковыми системами.",
        }
      - {
          label: "Скрыть метаданные (Необязательно)",
          name: "hidemeta",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Скрывает дату, время чтения и автора.",
        }
      - {
          label: "Свернуть описание (Необязательно)",
          name: "hideSummary",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Скрывает краткое описание на страницах со списками.",
        }
      - {
          label: "Скрыть нижний колонтитул (Необязательно)",
          name: "hideFooter",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Скрывает текст нижнего колонтитула.",
        }
      - {
          label: "Скрытый поиск (Необязательно)",
          name: "searchHidden",
          widget: "boolean",
          default: false,
          required: false,
          hint: "Скрывает страницу от поиска по сайту.",
        }

      # UI & Content Display
      - {
          label: "Показать оглавление (Необязательно)",
          name: "toc",
          widget: "boolean",
          default: true,
          required: false,
        }

      - {
          label: "Показать время на чтение (Необязательно)",
          name: "ShowReadingTime",
          widget: "boolean",
          default: true,
          required: false,
        }
      - {
          label: "Показать количество слов (Необязательно)",
          name: "ShowWordCount",
          widget: "boolean",
          default: true,
          required: false,
        }
      - {
          label: "Показать навигационную цепочку (Необязательно)",
          name: "ShowBreadCrumbs",
          widget: "boolean",
          default: true,
          required: false,
        }

      # - {
      #     label: "Comments",
      #     name: "comments",
      #     widget: "boolean",
      #     default: false,
      #     required: false,
      #     hint: "Shows/hides comments.",
      #   }

      - { label: "Контент", name: "body", widget: "markdown", required: true }
